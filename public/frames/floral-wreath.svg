<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Central white card for QR -->
  <rect x="65" y="65" width="270" height="270" rx="12" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>
  
  <!-- Corner ornamental borders -->
  <path d="M65 95 L65 65 L95 65" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <path d="M305 65 L335 65 L335 95" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <path d="M65 305 L65 335 L95 335" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <path d="M305 335 L335 335 L335 305" fill="none" stroke="#94A3B8" stroke-width="2"/>

  <!-- TOP - Leaves and flowers -->
  <ellipse cx="140" cy="50" rx="18" ry="7" fill="#86EFAC" transform="rotate(-15 140 50)"/>
  <ellipse cx="180" cy="42" rx="16" ry="6" fill="#6EE7B7" transform="rotate(10 180 42)"/>
  <ellipse cx="220" cy="42" rx="16" ry="6" fill="#86EFAC" transform="rotate(-10 220 42)"/>
  <ellipse cx="260" cy="50" rx="18" ry="7" fill="#6EE7B7" transform="rotate(15 260 50)"/>
  <!-- Top flowers -->
  <circle cx="160" cy="38" r="7" fill="#F9A8D4"/><circle cx="160" cy="38" r="3" fill="#FFD700"/>
  <circle cx="240" cy="38" r="7" fill="#93C5FD"/><circle cx="240" cy="38" r="3" fill="#FFD700"/>
  <circle cx="200" cy="30" r="9" fill="#FF69B4"/><circle cx="200" cy="30" r="4" fill="#FBBF24"/>
  <!-- Small buds -->
  <circle cx="120" cy="55" r="4" fill="#DDA0DD"/>
  <circle cx="280" cy="55" r="4" fill="#FCA5A5"/>

  <!-- BOTTOM - Leaves and flowers -->
  <ellipse cx="140" cy="350" rx="18" ry="7" fill="#86EFAC" transform="rotate(15 140 350)"/>
  <ellipse cx="180" cy="358" rx="16" ry="6" fill="#6EE7B7" transform="rotate(-10 180 358)"/>
  <ellipse cx="220" cy="358" rx="16" ry="6" fill="#86EFAC" transform="rotate(10 220 358)"/>
  <ellipse cx="260" cy="350" rx="18" ry="7" fill="#6EE7B7" transform="rotate(-15 260 350)"/>
  <!-- Bottom flowers -->
  <circle cx="160" cy="362" r="7" fill="#FBBF24"/><circle cx="160" cy="362" r="3" fill="#FF6347"/>
  <circle cx="240" cy="362" r="7" fill="#F9A8D4"/><circle cx="240" cy="362" r="3" fill="#FFD700"/>
  <circle cx="200" cy="370" r="9" fill="#FF69B4"/><circle cx="200" cy="370" r="4" fill="#FBBF24"/>
  <circle cx="120" cy="345" r="4" fill="#93C5FD"/>
  <circle cx="280" cy="345" r="4" fill="#DDA0DD"/>

  <!-- LEFT - Leaves and flowers -->
  <ellipse cx="50" cy="140" rx="7" ry="18" fill="#86EFAC" transform="rotate(15 50 140)"/>
  <ellipse cx="42" cy="180" rx="6" ry="16" fill="#6EE7B7" transform="rotate(-10 42 180)"/>
  <ellipse cx="42" cy="220" rx="6" ry="16" fill="#86EFAC" transform="rotate(10 42 220)"/>
  <ellipse cx="50" cy="260" rx="7" ry="18" fill="#6EE7B7" transform="rotate(-15 50 260)"/>
  <circle cx="38" cy="160" r="7" fill="#93C5FD"/><circle cx="38" cy="160" r="3" fill="#FFD700"/>
  <circle cx="38" cy="240" r="7" fill="#FBBF24"/><circle cx="38" cy="240" r="3" fill="#FF6347"/>
  <circle cx="30" cy="200" r="9" fill="#FF69B4"/><circle cx="30" cy="200" r="4" fill="#FBBF24"/>

  <!-- RIGHT - Leaves and flowers -->
  <ellipse cx="350" cy="140" rx="7" ry="18" fill="#86EFAC" transform="rotate(-15 350 140)"/>
  <ellipse cx="358" cy="180" rx="6" ry="16" fill="#6EE7B7" transform="rotate(10 358 180)"/>
  <ellipse cx="358" cy="220" rx="6" ry="16" fill="#86EFAC" transform="rotate(-10 358 220)"/>
  <ellipse cx="350" cy="260" rx="7" ry="18" fill="#6EE7B7" transform="rotate(15 350 260)"/>
  <circle cx="362" cy="160" r="7" fill="#F9A8D4"/><circle cx="362" cy="160" r="3" fill="#FFD700"/>
  <circle cx="362" cy="240" r="7" fill="#DDA0DD"/><circle cx="362" cy="240" r="3" fill="#FFD700"/>
  <circle cx="370" cy="200" r="9" fill="#93C5FD"/><circle cx="370" cy="200" r="4" fill="#FBBF24"/>

  <!-- Corner leaf clusters -->
  <ellipse cx="75" cy="55" rx="14" ry="5" fill="#86EFAC" transform="rotate(-45 75 55)"/>
  <ellipse cx="85" cy="48" rx="10" ry="4" fill="#6EE7B7" transform="rotate(-30 85 48)"/>
  <circle cx="68" cy="48" r="5" fill="#FCA5A5"/><circle cx="68" cy="48" r="2" fill="#FFD700"/>

  <ellipse cx="325" cy="55" rx="14" ry="5" fill="#86EFAC" transform="rotate(45 325 55)"/>
  <ellipse cx="315" cy="48" rx="10" ry="4" fill="#6EE7B7" transform="rotate(30 315 48)"/>
  <circle cx="332" cy="48" r="5" fill="#93C5FD"/><circle cx="332" cy="48" r="2" fill="#FFD700"/>

  <ellipse cx="75" cy="345" rx="14" ry="5" fill="#86EFAC" transform="rotate(45 75 345)"/>
  <ellipse cx="85" cy="352" rx="10" ry="4" fill="#6EE7B7" transform="rotate(30 85 352)"/>
  <circle cx="68" cy="352" r="5" fill="#FBBF24"/><circle cx="68" cy="352" r="2" fill="#FF6347"/>

  <ellipse cx="325" cy="345" rx="14" ry="5" fill="#86EFAC" transform="rotate(-45 325 345)"/>
  <ellipse cx="315" cy="352" rx="10" ry="4" fill="#6EE7B7" transform="rotate(-30 315 352)"/>
  <circle cx="332" cy="352" r="5" fill="#F9A8D4"/><circle cx="332" cy="352" r="2" fill="#FFD700"/>
</svg>
