  <polygon points="55,372 60,362 50,362" fill="#4ECDC4"/>
  <circle cx="30" cy="355" r="4" fill="#FF6B6B"/>
  <path d="M42,345 C42,340 48,338 48,343 C48,338 54,340 54,345 C54,350 48,354 48,354 C48,354 42,350 42,345Z" fill="#DDA0DD"/>

  <!-- BOTTOM-RIGHT confetti cluster -->
  <polygon points="360,360 363,353 370,353 365,358 367,365 360,362 353,365 355,358 350,353 357,353" fill="#87CEEB"/>
  <polygon points="345,372 350,362 340,362" fill="#FF6B6B"/>
  <circle cx="370" cy="355" r="4" fill="#96CEB4"/>
  <path d="M352,345 C352,340 358,338 358,343 C358,338 364,340 364,345 C364,350 358,354 358,354 C358,354 352,350 352,345Z" fill="#FF69B4"/>

  <!-- Top edge triangles -->
  <polygon points="100,27 105,35 95,35" fill="#4ECDC4"/>
  <polygon points="150,27 155,35 145,35" fill="#FF6B6B"/>
  <polygon points="200,27 205,35 195,35" fill="#FFEAA7"/>
  <polygon points="250,27 255,35 245,35" fill="#45B7D1"/>
  <polygon points="300,27 305,35 295,35" fill="#DDA0DD"/>

  <!-- Bottom edge triangles -->
  <polygon points="100,373 105,365 95,365" fill="#DDA0DD"/>
  <polygon points="150,373 155,365 145,365" fill="#45B7D1"/>
  <polygon points="200,373 205,365 195,365" fill="#FF6B6B"/>
  <polygon points="250,373 255,365 245,365" fill="#4ECDC4"/>
  <polygon points="300,373 305,365 295,365" fill="#FFEAA7"/>

  <!-- Side dots -->
  <circle cx="28" cy="100" r="3" fill="#FF6B6B"/>
  <circle cx="28" cy="200" r="3" fill="#4ECDC4"/>
  <circle cx="28" cy="300" r="3" fill="#FFEAA7"/>
  <circle cx="372" cy="100" r="3" fill="#FFEAA7"/>
  <circle cx="372" cy="200" r="3" fill="#FF6B6B"/>
