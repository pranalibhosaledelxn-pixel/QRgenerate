  <!-- Triangle -->
  <polygon points="55,28 60,38 50,38" fill="#4ECDC4"/>
  <!-- Circle -->
  <circle cx="30" cy="50" r="4" fill="#45B7D1"/>
  <!-- Heart -->
  <path d="M42,55 C42,50 48,48 48,53 C48,48 54,50 54,55 C54,60 48,64 48,64 C48,64 42,60 42,55Z" fill="#FF69B4"/>
  <!-- Diamond -->
  <polygon points="28,38 32,34 36,38 32,42" fill="#FFEAA7"/>

  <!-- TOP-RIGHT confetti cluster -->
  <polygon points="360,40 363,33 370,33 365,38 367,45 360,42 353,45 355,38 350,33 357,33" fill="#96CEB4"/>
  <polygon points="345,28 350,38 340,38" fill="#DDA0DD"/>
  <circle cx="370" cy="50" r="4" fill="#87CEEB"/>
  <path d="M352,55 C352,50 358,48 358,53 C358,48 364,50 364,55 C364,60 358,64 358,64 C358,64 352,60 352,55Z" fill="#FF69B4"/>
  <polygon points="372,38 376,34 380,38 376,42" fill="#FF6B6B"/>

  <!-- BOTTOM-LEFT confetti cluster -->
