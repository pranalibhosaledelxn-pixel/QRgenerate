<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Outer border -->
  <rect x="25" y="25" width="350" height="350" rx="6" stroke="#1E3A5F" stroke-width="3" fill="none"/>
  <!-- Inner border -->
  <rect x="35" y="35" width="330" height="330" rx="4" stroke="#1E3A5F" stroke-width="1.5" fill="none"/>
  
  <!-- White center for QR -->
