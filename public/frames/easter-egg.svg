<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Egg shape -->
  <ellipse cx="200" cy="210" rx="165" ry="185" fill="#FDE8E0" stroke="#F9A8D4" stroke-width="4"/>
  
  <!-- Zigzag stripe top -->
  <polyline points="60,130 75,115 90,130 105,115 120,130 135,115 150,130 165,115 180,130 195,115 210,130 225,115 240,130 255,115 270,130 285,115 300,130 315,115 330,130 340,115" fill="none" stroke="#FB923C" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Zigzag stripe bottom -->
  <polyline points="70,290 85,275 100,290 115,275 130,290 145,275 160,290 175,275 190,290 205,275 220,290 235,275 250,290 265,275 280,290 295,275 310,290 325,275 335,290" fill="none" stroke="#A78BFA" stroke-width="3" stroke-linecap="round"/>

  <!-- Dots pattern -->
  <circle cx="80" cy="210" r="4" fill="#FBBF24" opacity="0.5"/>
  <circle cx="320" cy="210" r="4" fill="#FBBF24" opacity="0.5"/>
  <circle cx="90" cy="170" r="3" fill="#F9A8D4" opacity="0.5"/>
  <circle cx="310" cy="170" r="3" fill="#F9A8D4" opacity="0.5"/>
  <circle cx="90" cy="250" r="3" fill="#93C5FD" opacity="0.5"/>
  <circle cx="310" cy="250" r="3" fill="#93C5FD" opacity="0.5"/>

  <!-- Flowers around -->
  <!-- Top flower -->
  <circle cx="200" cy="35" r="7" fill="#FF69B4"/>
  <circle cx="193" cy="28" r="5" fill="#FF69B4"/>
  <circle cx="207" cy="28" r="5" fill="#FF69B4"/>
  <circle cx="193" cy="42" r="5" fill="#FF69B4"/>
  <circle cx="207" cy="42" r="5" fill="#FF69B4"/>
  <circle cx="200" cy="35" r="3" fill="#FFD700"/>
  
  <!-- Left flower -->
  <circle cx="52" cy="200" r="6" fill="#93C5FD"/>
  <circle cx="46" cy="194" r="5" fill="#93C5FD"/>
  <circle cx="58" cy="194" r="5" fill="#93C5FD"/>
  <circle cx="46" cy="206" r="5" fill="#93C5FD"/>
  <circle cx="58" cy="206" r="5" fill="#93C5FD"/>
  <circle cx="52" cy="200" r="3" fill="#FFD700"/>
  
  <!-- Right flower -->
  <circle cx="348" cy="200" r="6" fill="#FBBF24"/>
  <circle cx="342" cy="194" r="5" fill="#FBBF24"/>
  <circle cx="354" cy="194" r="5" fill="#FBBF24"/>
  <circle cx="342" cy="206" r="5" fill="#FBBF24"/>
  <circle cx="354" cy="206" r="5" fill="#FBBF24"/>
  <circle cx="348" cy="200" r="3" fill="#FF6347"/>

  <!-- Bottom flowers -->
  <circle cx="150" cy="385" r="5" fill="#F472B6"/>
  <circle cx="145" cy="380" r="4" fill="#F472B6"/>
  <circle cx="155" cy="380" r="4" fill="#F472B6"/>
  <circle cx="150" cy="385" r="2.5" fill="#FFD700"/>
  
  <circle cx="250" cy="385" r="5" fill="#86EFAC"/>
  <circle cx="245" cy="380" r="4" fill="#86EFAC"/>
  <circle cx="255" cy="380" r="4" fill="#86EFAC"/>
  <circle cx="250" cy="385" r="2.5" fill="#FFD700"/>

  <!-- Leaves -->
  <ellipse cx="40" cy="150" rx="14" ry="5" fill="#86EFAC" transform="rotate(-40 40 150)"/>
  <ellipse cx="360" cy="150" rx="14" ry="5" fill="#86EFAC" transform="rotate(40 360 150)"/>
  <ellipse cx="40" cy="260" rx="12" ry="4" fill="#6EE7B7" transform="rotate(30 40 260)"/>
  <ellipse cx="360" cy="260" rx="12" ry="4" fill="#6EE7B7" transform="rotate(-30 360 260)"/>

  <!-- Branch left -->
  <line x1="35" y1="300" x2="55" y2="160" stroke="#D4A574" stroke-width="1.5"/>
  <ellipse cx="42" cy="230" rx="8" ry="4" fill="#93C5FD" transform="rotate(-20 42 230)"/>
  <ellipse cx="48" cy="190" rx="6" ry="3" fill="#FBBF24" transform="rotate(15 48 190)"/>
  
  <!-- Transparent center for QR -->
  <rect x="90" y="140" width="220" height="180" rx="6" fill="white"/>
</svg>
